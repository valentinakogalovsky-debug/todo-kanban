<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do Board</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #1f2933;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .app {
      width: 100%;
      max-width: 980px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 32px;
      font-weight: 700;
      text-align: center;
    }

    .form {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid #c8d2df;
      border-radius: 6px;
      font-size: 16px;
      background: #ffffff;
    }

    input:focus {
      outline: 2px solid #7aa7ff;
      border-color: #4b83f1;
    }

    button {
      border: 0;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }

    .add-button {
      padding: 0 18px;
      color: #ffffff;
      background: #2563eb;
      font-weight: 700;
    }

    .add-button:hover {
      background: #1d4ed8;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .column {
      min-height: 260px;
      padding: 12px;
      border: 1px solid #d8e0ea;
      border-radius: 6px;
      background: #eaf0f7;
    }

    .column.drag-over {
      border-color: #2563eb;
      background: #dbeafe;
    }

    .column-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .tasks {
      min-height: 200px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border: 1px solid #d8e0ea;
      border-radius: 6px;
      background: #ffffff;
      cursor: grab;
    }

    .task.dragging {
      opacity: 0.6;
      cursor: grabbing;
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .task-text {
      flex: 1;
      overflow-wrap: anywhere;
      line-height: 1.4;
    }

    .task.done .task-text {
      color: #7b8794;
      text-decoration: line-through;
    }

    .delete-button {
      padding: 8px 10px;
      color: #ffffff;
      background: #dc2626;
    }

    .delete-button:hover {
      background: #b91c1c;
    }

    @media (max-width: 480px) {
      .form {
        flex-direction: column;
      }

      .add-button {
        min-height: 44px;
      }

      .board {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>To-Do Board</h1>

    <form class="form" id="taskForm">
      <input id="taskInput" type="text" placeholder="Новая задача" autocomplete="off">
      <button class="add-button" type="submit">Добавить</button>
    </form>

    <section class="board" aria-label="Канбан-доска">
      <div class="column" data-status="todo">
        <h2 class="column-title">К выполнению</h2>
        <ul class="tasks" id="todoTasks"></ul>
      </div>

      <div class="column" data-status="in-progress">
        <h2 class="column-title">В работе</h2>
        <ul class="tasks" id="inProgressTasks"></ul>
      </div>

      <div class="column" data-status="done">
        <h2 class="column-title">Готово</h2>
        <ul class="tasks" id="doneTasks"></ul>
      </div>
    </section>
  </main>

  <script>
    const taskForm = document.querySelector("#taskForm");
    const taskInput = document.querySelector("#taskInput");
    const todoTasks = document.querySelector("#todoTasks");
    const columns = document.querySelectorAll(".column");
    let draggedTask = null;

    function updateTaskStatus(item, status) {
      item.dataset.status = status;
      item.classList.toggle("done", status === "done");
      item.querySelector(".task-checkbox").checked = status === "done";
    }

    function moveTaskToStatus(item, status) {
      const targetColumn = document.querySelector(`[data-status="${status}"]`);
      const targetList = targetColumn.querySelector(".tasks");

      targetList.append(item);
      updateTaskStatus(item, status);
    }

    function createTask(text) {
      const item = document.createElement("li");
      item.className = "task";
      item.dataset.status = "todo";
      item.draggable = true;

      const checkbox = document.createElement("input");
      checkbox.className = "task-checkbox";
      checkbox.type = "checkbox";

      const taskText = document.createElement("span");
      taskText.className = "task-text";
      taskText.textContent = text;

      const deleteButton = document.createElement("button");
      deleteButton.className = "delete-button";
      deleteButton.type = "button";
      deleteButton.textContent = "Удалить";

      checkbox.addEventListener("change", () => {
        if (checkbox.checked) {
          moveTaskToStatus(item, "done");
          return;
        }

        moveTaskToStatus(item, "todo");
      });

      deleteButton.addEventListener("click", () => {
        item.remove();
      });

      item.addEventListener("dragstart", () => {
        draggedTask = item;
        item.classList.add("dragging");
      });

      item.addEventListener("dragend", () => {
        item.classList.remove("dragging");
        draggedTask = null;
      });

      item.append(checkbox, taskText, deleteButton);
      return item;
    }

    columns.forEach((column) => {
      column.addEventListener("dragover", (event) => {
        event.preventDefault();
        column.classList.add("drag-over");
      });

      column.addEventListener("dragleave", () => {
        column.classList.remove("drag-over");
      });

      column.addEventListener("drop", () => {
        column.classList.remove("drag-over");

        if (!draggedTask) {
          return;
        }

        moveTaskToStatus(draggedTask, column.dataset.status);
      });
    });

    taskForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const text = taskInput.value.trim();
      if (!text) {
        return;
      }

      todoTasks.append(createTask(text));
      taskInput.value = "";
      taskInput.focus();
    });
  </script>
</body>
</html>
