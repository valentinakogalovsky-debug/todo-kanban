<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do Board</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #f7f0df;
      background:
        linear-gradient(rgba(18, 40, 29, 0.72), rgba(18, 40, 29, 0.78)),
        radial-gradient(circle at 20% 20%, rgba(113, 147, 92, 0.45), transparent 28%),
        linear-gradient(135deg, #10251a 0%, #27472f 38%, #6f5738 100%);
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .app {
      width: 100%;
      max-width: 980px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      color: #fff7df;
      text-shadow: 0 2px 8px rgba(16, 37, 26, 0.7);
    }

    .form {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    input,
    select {
      flex: 1;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid #c8d2df;
      border-radius: 6px;
      font-size: 16px;
      color: #233225;
      background: rgba(255, 250, 235, 0.94);
    }

    input:focus,
    select:focus {
      outline: 2px solid #b5d18a;
      border-color: #5e8b4a;
    }

    select {
      max-width: 160px;
    }

    .date-input {
      max-width: 170px;
    }

    button {
      border: 0;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }

    .add-button {
      padding: 0 18px;
      color: #fff7df;
      background: #4f7b3f;
      font-weight: 700;
    }

    .add-button:hover {
      background: #3f6532;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .column {
      min-height: 260px;
      padding: 12px;
      border: 1px solid rgba(207, 190, 143, 0.6);
      border-radius: 6px;
      background: rgba(35, 60, 39, 0.78);
      box-shadow: inset 0 0 0 1px rgba(255, 248, 220, 0.06);
    }

    .column.drag-over {
      border-color: #d9bf74;
      background: rgba(68, 94, 49, 0.82);
    }

    .column-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
      color: #fff7df;
    }

    .tasks {
      min-height: 200px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .task {
      display: flex;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px;
      border: 1px solid #7b5635;
      border-radius: 6px;
      color: #2a1c11;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.08), transparent 18%, rgba(66, 36, 18, 0.08) 50%, transparent 82%),
        linear-gradient(180deg, #c99a62 0%, #b77d43 100%);
      box-shadow: 0 7px 18px rgba(16, 37, 26, 0.24);
      cursor: grab;
    }

    .task.dragging {
      opacity: 0.6;
      cursor: grabbing;
    }

    .task.priority-low {
      border-left: 6px solid #5e8b4a;
    }

    .task.priority-medium {
      border-left: 6px solid #d1a13f;
    }

    .task.priority-high {
      border-left: 6px solid #a63d40;
    }

    .task.deadline-urgent {
      background:
        linear-gradient(90deg, rgba(255,255,255,0.08), transparent 18%, rgba(66, 36, 18, 0.08) 50%, transparent 82%),
        linear-gradient(180deg, #d5aa64 0%, #bd8446 100%);
    }

    .task.deadline-overdue {
      background:
        linear-gradient(90deg, rgba(255,255,255,0.08), transparent 18%, rgba(66, 36, 18, 0.08) 50%, transparent 82%),
        linear-gradient(180deg, #c57b5a 0%, #a85a3d 100%);
      border-color: #8f352f;
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      appearance: none;
      border: 2px solid #7a1f32;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ff8fa3, #b8324a 62%, #7a1f32);
      cursor: pointer;
    }

    .task-checkbox:checked {
      border-color: #315f2e;
      background: radial-gradient(circle at 35% 30%, #d9f99d, #5e8b4a 62%, #315f2e);
      box-shadow: inset 0 0 0 3px rgba(255, 247, 223, 0.55);
    }

    .task-text {
      flex: 1;
      overflow-wrap: break-word;
      word-break: normal;
      line-height: 1.4;
    }

    .task-content {
      flex: 1 1 180px;
      min-width: 0;
    }

    .task-priority {
      display: inline-block;
      margin-top: 6px;
      padding: 3px 7px;
      border-radius: 6px;
      background: rgba(255, 247, 223, 0.72);
      color: #4b3621;
      font-size: 12px;
      font-weight: 700;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .task-deadline,
    .task-tag,
    .task-deadline-label {
      display: inline-block;
      padding: 3px 7px;
      border-radius: 6px;
      background: #eef2f7;
      color: #52606d;
      font-size: 12px;
      font-weight: 700;
    }

    .task-deadline-label.urgent {
      background: #fef3c7;
      color: #92400e;
    }

    .task-deadline-label.overdue {
      background: #fee2e2;
      color: #991b1b;
    }

    .task-tag {
      background: #5e8b4a;
      color: #fff7df;
    }

    .task.done .task-text {
      color: #7b8794;
      text-decoration: line-through;
    }

    .delete-button {
      padding: 8px 10px;
      color: #fff7df;
      background: #8f352f;
    }

    .delete-button:hover {
      background: #73302b;
    }

    .edit-button,
    .restore-button {
      padding: 8px 10px;
      color: #fff7df;
      background: #5a4632;
    }

    .edit-button:hover,
    .restore-button:hover {
      background: #453626;
    }

    .trash {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid rgba(207, 190, 143, 0.6);
      border-radius: 6px;
      background: rgba(35, 60, 39, 0.82);
    }

    .trash .task {
      cursor: default;
    }

    .trash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .trash-title {
      margin: 0;
      font-size: 18px;
      color: #fff7df;
    }

    .trash-empty {
      margin: 0;
      color: #d8cda5;
    }

    .clear-button {
      padding: 8px 10px;
      color: #fff7df;
      background: #7b5635;
    }

    .clear-button:hover {
      background: #604329;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(31, 41, 51, 0.45);
    }

    .modal.open {
      display: flex;
    }

    .modal-panel {
      width: 100%;
      max-width: 420px;
      padding: 18px;
      border-radius: 6px;
      color: #2a1c11;
      background: #fff4d6;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-title {
      margin: 0;
      font-size: 20px;
    }

    .close-button {
      width: 34px;
      height: 34px;
      color: #2a1c11;
      background: #e8d8ad;
    }

    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .tag-editor {
      flex: 1 1 100%;
      padding: 10px;
      border: 1px solid rgba(207, 190, 143, 0.6);
      border-radius: 6px;
      background: rgba(255, 247, 223, 0.14);
    }

    .tag-editor-title {
      display: block;
      margin-bottom: 8px;
      color: #fff7df;
      font-size: 14px;
      font-weight: 700;
    }

    .modal-field .tag-editor-title,
    .modal-panel .tag-editor-title {
      color: #2a1c11;
    }

    .tag-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .tag-input-row input {
      max-width: none;
    }

    .tag-add-button {
      padding: 0 12px;
      color: #fff7df;
      background: #4f7b3f;
      font-weight: 700;
      white-space: nowrap;
    }

    .tag-palette,
    .tag-row-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .tag-color-button {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 247, 223, 0.8);
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(16, 37, 26, 0.25);
    }

    .tag-color-button.selected {
      outline: 2px solid #fff7df;
      outline-offset: 2px;
    }

    .modal-panel .tag-color-button.selected {
      outline-color: #2a1c11;
    }

    .tag-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tag-row {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) auto;
      gap: 8px;
      padding: 8px;
      border-radius: 6px;
      background: rgba(255, 247, 223, 0.18);
    }

    .modal-panel .tag-row {
      background: rgba(95, 71, 45, 0.12);
    }

    .tag-name-input {
      max-width: none;
    }

    .tag-remove-button {
      padding: 0 10px;
      color: #fff7df;
      background: #8f352f;
    }

    .tag-row-palette {
      grid-column: 1 / -1;
      margin-bottom: 0;
    }

    .modal-field input,
    .modal-field select {
      max-width: none;
      font-weight: 400;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    .save-button {
      padding: 10px 14px;
      color: #fff7df;
      background: #4f7b3f;
      font-weight: 700;
    }

    .cancel-button {
      padding: 10px 14px;
      color: #2a1c11;
      background: #e8d8ad;
    }

    @media (max-width: 480px) {
      .form {
        flex-direction: column;
      }

      .add-button {
        min-height: 44px;
      }

      select {
        max-width: none;
      }

      .date-input,
      .tag-editor {
        max-width: none;
      }

      .tag-input-row,
      .tag-row {
        grid-template-columns: 1fr;
        flex-direction: column;
      }

      .board {
        grid-template-columns: 1fr;
      }

    }
  </style>
</head>
<body>
  <main class="app">
    <h1>To-Do Board</h1>

    <form class="form" id="taskForm">
      <input id="taskInput" type="text" placeholder="Новая задача" autocomplete="off">
      <select id="taskPriority" aria-label="Приоритет задачи">
        <option value="low">Низкий</option>
        <option value="medium" selected>Средний</option>
        <option value="high">Высокий</option>
      </select>
      <input class="date-input" id="taskDeadline" type="date" aria-label="Дедлайн задачи">
      <div class="tag-editor" aria-label="Теги задачи">
        <span class="tag-editor-title">Теги</span>
        <div class="tag-input-row">
          <input id="newTagInput" type="text" placeholder="Название тега" autocomplete="off">
          <button class="tag-add-button" id="addNewTagButton" type="button">Добавить тег</button>
        </div>
        <div class="tag-palette" id="newTagPalette" aria-label="Цвет нового тега"></div>
        <div class="tag-list" id="newTagList"></div>
      </div>
      <button class="add-button" type="submit">Добавить</button>
    </form>

    <section class="board" aria-label="Канбан-доска">
      <div class="column" data-status="todo">
        <h2 class="column-title">К выполнению</h2>
        <ul class="tasks" id="todoTasks"></ul>
      </div>

      <div class="column" data-status="in-progress">
        <h2 class="column-title">В работе</h2>
        <ul class="tasks" id="inProgressTasks"></ul>
      </div>

      <div class="column" data-status="done">
        <h2 class="column-title">Готово</h2>
        <ul class="tasks" id="doneTasks"></ul>
      </div>
    </section>

    <section class="trash" aria-label="Корзина">
      <div class="trash-header">
        <h2 class="trash-title">Корзина</h2>
        <button class="clear-button" id="clearTrashButton" type="button">Очистить корзину</button>
      </div>
      <p class="trash-empty" id="trashEmpty">Корзина пуста</p>
      <ul class="tasks" id="trashTasks"></ul>
    </section>
  </main>

  <div class="modal" id="editModal" aria-hidden="true">
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="editModalTitle">Редактировать задачу</h2>
        <button class="close-button" id="closeModalButton" type="button" aria-label="Закрыть">×</button>
      </div>

      <form id="editForm">
        <label class="modal-field">
          Текст задачи
          <input id="editTitleInput" type="text" autocomplete="off">
        </label>

        <label class="modal-field">
          Приоритет
          <select id="editPrioritySelect">
            <option value="low">Низкий</option>
            <option value="medium">Средний</option>
            <option value="high">Высокий</option>
          </select>
        </label>

        <label class="modal-field">
          Дедлайн
          <input id="editDeadlineInput" type="date">
        </label>

        <label class="modal-field">
          Теги
          <div class="tag-editor" aria-label="Редактирование тегов">
            <div class="tag-input-row">
              <input id="editTagInput" type="text" placeholder="Название тега" autocomplete="off">
              <button class="tag-add-button" id="addEditTagButton" type="button">Добавить тег</button>
            </div>
            <div class="tag-palette" id="editTagPalette" aria-label="Цвет нового тега"></div>
            <div class="tag-list" id="editTagList"></div>
          </div>
        </label>

        <div class="modal-actions">
          <button class="cancel-button" id="cancelEditButton" type="button">Отмена</button>
          <button class="save-button" type="submit">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const storageKey = "todo-kanban-tasks";
    const priorityLabels = {
      low: "Низкий",
      medium: "Средний",
      high: "Высокий"
    };
    const tagColors = [
      { id: "green", label: "Зелёный", value: "#5E8B4A" },
      { id: "olive", label: "Оливковый", value: "#7A8F45" },
      { id: "brown", label: "Коричневый", value: "#8B5A2B" },
      { id: "sand", label: "Песочный", value: "#C2A15A" },
      { id: "dark-green", label: "Тёмно-зелёный", value: "#2F5D3A" },
      { id: "berry-red", label: "Ягодный красный", value: "#A63D40" },
      { id: "cranberry", label: "Клюквенный", value: "#8E2F4F" },
      { id: "mustard", label: "Горчичный", value: "#B88A2D" },
      { id: "sage", label: "Серо-зелёный", value: "#6F8A78" },
      { id: "wood-orange", label: "Древесно-оранжевый", value: "#B66A32" }
    ];
    const taskForm = document.querySelector("#taskForm");
    const taskInput = document.querySelector("#taskInput");
    const taskPriority = document.querySelector("#taskPriority");
    const taskDeadline = document.querySelector("#taskDeadline");
    const newTagInput = document.querySelector("#newTagInput");
    const addNewTagButton = document.querySelector("#addNewTagButton");
    const newTagPalette = document.querySelector("#newTagPalette");
    const newTagList = document.querySelector("#newTagList");
    const columns = document.querySelectorAll(".column");
    const trashTasks = document.querySelector("#trashTasks");
    const trashEmpty = document.querySelector("#trashEmpty");
    const clearTrashButton = document.querySelector("#clearTrashButton");
    const editModal = document.querySelector("#editModal");
    const editForm = document.querySelector("#editForm");
    const editTitleInput = document.querySelector("#editTitleInput");
    const editPrioritySelect = document.querySelector("#editPrioritySelect");
    const editDeadlineInput = document.querySelector("#editDeadlineInput");
    const editTagInput = document.querySelector("#editTagInput");
    const addEditTagButton = document.querySelector("#addEditTagButton");
    const editTagPalette = document.querySelector("#editTagPalette");
    const editTagList = document.querySelector("#editTagList");
    const closeModalButton = document.querySelector("#closeModalButton");
    const cancelEditButton = document.querySelector("#cancelEditButton");
    let tasks = normalizeTasks(loadTasks());
    let draggedTask = null;
    let editingTaskId = null;
    let newTaskTags = [];
    let editTaskTags = [];
    let selectedNewTagColor = tagColors[0].id;
    let selectedEditTagColor = tagColors[0].id;

    function loadTasks() {
      const savedTasks = localStorage.getItem(storageKey);

      if (!savedTasks) {
        return [];
      }

      try {
        const parsedTasks = JSON.parse(savedTasks);
        return Array.isArray(parsedTasks) ? parsedTasks : [];
      } catch {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(storageKey, JSON.stringify(tasks));
    }

    function normalizeTag(tag) {
      if (typeof tag === "string") {
        return {
          name: tag,
          color: tagColors[0].id
        };
      }

      return {
        name: tag.name || "",
        color: tagColors.some((color) => color.id === tag.color) ? tag.color : tagColors[0].id
      };
    }

    function normalizeTasks(taskList) {
      return taskList.map((task, index) => ({
        id: task.id || `${Date.now()}-${index}`,
        title: task.title || "",
        status: task.status || "todo",
        priority: task.priority || "medium",
        deleted: Boolean(task.deleted),
        previousStatus: task.previousStatus || null,
        deadline: task.deadline || "",
        tags: Array.isArray(task.tags) ? task.tags.map(normalizeTag).filter((tag) => tag.name) : [],
        order: Number.isFinite(task.order) ? task.order : index
      }));
    }

    function getTaskById(id) {
      return tasks.find((task) => task.id === id);
    }

    function cloneTags(tags) {
      return tags.map((tag) => ({ ...tag }));
    }

    function getTagColor(colorId) {
      return tagColors.find((color) => color.id === colorId) || tagColors[0];
    }

    function getReadableTextColor(hex) {
      const red = parseInt(hex.slice(1, 3), 16);
      const green = parseInt(hex.slice(3, 5), 16);
      const blue = parseInt(hex.slice(5, 7), 16);
      const brightness = (red * 299 + green * 587 + blue * 114) / 1000;

      return brightness > 145 ? "#2a1c11" : "#fff7df";
    }

    function applyTagColor(element, colorId) {
      const color = getTagColor(colorId);
      element.style.background = color.value;
      element.style.color = getReadableTextColor(color.value);
    }

    function renderPalette(container, selectedColor, onSelect) {
      container.innerHTML = "";

      tagColors.forEach((color) => {
        const button = document.createElement("button");
        button.className = "tag-color-button";
        button.type = "button";
        button.title = color.label;
        button.setAttribute("aria-label", color.label);
        button.style.background = color.value;
        button.classList.toggle("selected", color.id === selectedColor);

        button.addEventListener("click", () => {
          onSelect(color.id);
        });

        container.append(button);
      });
    }

    function renderTagList(container, tags, onChange) {
      container.innerHTML = "";

      tags.forEach((tag, index) => {
        const row = document.createElement("div");
        row.className = "tag-row";

        const input = document.createElement("input");
        input.className = "tag-name-input";
        input.type = "text";
        input.value = tag.name;
        input.setAttribute("aria-label", "Название тега");

        const removeButton = document.createElement("button");
        removeButton.className = "tag-remove-button";
        removeButton.type = "button";
        removeButton.textContent = "Удалить";

        const palette = document.createElement("div");
        palette.className = "tag-row-palette";

        input.addEventListener("input", () => {
          tags[index].name = input.value.trim();
        });

        removeButton.addEventListener("click", () => {
          tags.splice(index, 1);
          onChange();
        });

        renderPalette(palette, tag.color, (colorId) => {
          tags[index].color = colorId;
          onChange();
        });

        row.append(input, removeButton, palette);
        container.append(row);
      });
    }

    function addTag(tags, input, colorId, onChange) {
      const name = input.value.trim();

      if (!name) {
        return;
      }

      tags.push({ name, color: colorId });
      input.value = "";
      onChange();
    }

    function getNextOrder(status) {
      const orders = tasks
        .filter((task) => !task.deleted && task.status === status)
        .map((task) => task.order);

      return orders.length ? Math.max(...orders) + 1 : 0;
    }

    function createTaskData(title, priority, deadline, tags) {
      return {
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        title,
        status: "todo",
        priority,
        deadline,
        tags: cloneTags(tags),
        order: getNextOrder("todo"),
        deleted: false,
        previousStatus: null
      };
    }

    function updateTaskStatus(task, status) {
      task.status = status;
      task.deleted = false;
      task.previousStatus = null;
      task.order = getNextOrder(status);
      saveTasks();
      renderTasks();
    }

    function formatDeadline(value) {
      if (!value) {
        return "";
      }

      const [year, month, day] = value.split("-");
      return `${day}.${month}.${year}`;
    }

    function getDeadlineState(task) {
      if (!task.deadline || task.status === "done") {
        return "";
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const tomorrow = new Date(today);
      tomorrow.setDate(today.getDate() + 1);

      const deadline = new Date(`${task.deadline}T00:00:00`);

      if (deadline < today) {
        return "overdue";
      }

      if (deadline <= tomorrow) {
        return "urgent";
      }

      return "";
    }

    function moveTaskToStatus(taskId, status) {
      const task = getTaskById(taskId);

      if (!task) {
        return;
      }

      updateTaskStatus(task, status);
    }

    function sendTaskToTrash(taskId) {
      const task = getTaskById(taskId);

      if (!task) {
        return;
      }

      task.previousStatus = task.status;
      task.deleted = true;
      saveTasks();
      renderTasks();
    }

    function restoreTask(taskId) {
      const task = getTaskById(taskId);

      if (!task) {
        return;
      }

      task.status = task.previousStatus || "todo";
      task.previousStatus = null;
      task.deleted = false;
      task.order = getNextOrder(task.status);
      saveTasks();
      renderTasks();
    }

    function deleteTaskForever(taskId) {
      tasks = tasks.filter((task) => task.id !== taskId);
      saveTasks();
      renderTasks();
    }

    function openEditModal(taskId) {
      const task = getTaskById(taskId);

      if (!task || task.deleted) {
        return;
      }

      editingTaskId = taskId;
      editTitleInput.value = task.title;
      editPrioritySelect.value = task.priority;
      editDeadlineInput.value = task.deadline;
      editTaskTags = cloneTags(task.tags);
      renderEditTagControls();
      editModal.classList.add("open");
      editModal.setAttribute("aria-hidden", "false");
      editTitleInput.focus();
    }

    function closeEditModal() {
      editingTaskId = null;
      editTaskTags = [];
      editForm.reset();
      editModal.classList.remove("open");
      editModal.setAttribute("aria-hidden", "true");
    }

    function createTaskElement(task) {
      const item = document.createElement("li");
      const deadlineState = getDeadlineState(task);
      item.className = `task priority-${task.priority}`;
      item.dataset.id = task.id;
      item.dataset.status = task.status;
      item.draggable = true;
      item.classList.toggle("done", task.status === "done");
      item.classList.toggle("deadline-urgent", deadlineState === "urgent");
      item.classList.toggle("deadline-overdue", deadlineState === "overdue");

      const checkbox = document.createElement("input");
      checkbox.className = "task-checkbox";
      checkbox.type = "checkbox";
      checkbox.checked = task.status === "done";

      const taskContent = document.createElement("div");
      taskContent.className = "task-content";

      const taskText = document.createElement("span");
      taskText.className = "task-text";
      taskText.textContent = task.title;

      const priority = document.createElement("span");
      priority.className = "task-priority";
      priority.textContent = priorityLabels[task.priority];

      const meta = document.createElement("div");
      meta.className = "task-meta";

      if (task.deadline) {
        const deadline = document.createElement("span");
        deadline.className = "task-deadline";
        deadline.textContent = `Дедлайн: ${formatDeadline(task.deadline)}`;
        meta.append(deadline);
      }

      if (deadlineState) {
        const deadlineLabel = document.createElement("span");
        deadlineLabel.className = `task-deadline-label ${deadlineState}`;
        deadlineLabel.textContent = deadlineState === "overdue" ? "Просрочено" : "Срочно";
        meta.append(deadlineLabel);
      }

      task.tags.forEach((tag) => {
        const tagBadge = document.createElement("span");
        tagBadge.className = "task-tag";
        tagBadge.textContent = tag.name;
        applyTagColor(tagBadge, tag.color);
        meta.append(tagBadge);
      });

      const editButton = document.createElement("button");
      editButton.className = "edit-button";
      editButton.type = "button";
      editButton.textContent = "Редактировать";

      const deleteButton = document.createElement("button");
      deleteButton.className = "delete-button";
      deleteButton.type = "button";
      deleteButton.textContent = "Удалить";

      checkbox.addEventListener("change", () => {
        if (checkbox.checked) {
          moveTaskToStatus(task.id, "done");
          return;
        }

        moveTaskToStatus(task.id, "todo");
      });

      editButton.addEventListener("click", (event) => {
        event.stopPropagation();
        openEditModal(task.id);
      });

      deleteButton.addEventListener("click", () => {
        sendTaskToTrash(task.id);
      });

      item.addEventListener("dragstart", () => {
        draggedTask = task.id;
        item.classList.add("dragging");
      });

      item.addEventListener("dragend", () => {
        item.classList.remove("dragging");
        draggedTask = null;
      });

      item.addEventListener("click", (event) => {
        if (event.target.closest("button") || event.target.closest("input")) {
          return;
        }

        openEditModal(task.id);
      });

      taskContent.append(taskText, priority);

      if (meta.children.length) {
        taskContent.append(meta);
      }

      item.append(checkbox, taskContent, editButton, deleteButton);
      return item;
    }

    function createTrashTaskElement(task) {
      const item = document.createElement("li");
      item.className = `task priority-${task.priority}`;

      const taskContent = document.createElement("div");
      taskContent.className = "task-content";

      const taskText = document.createElement("span");
      taskText.className = "task-text";
      taskText.textContent = task.title;

      const priority = document.createElement("span");
      priority.className = "task-priority";
      priority.textContent = priorityLabels[task.priority];

      const meta = document.createElement("div");
      meta.className = "task-meta";

      if (task.deadline) {
        const deadline = document.createElement("span");
        deadline.className = "task-deadline";
        deadline.textContent = `Дедлайн: ${formatDeadline(task.deadline)}`;
        meta.append(deadline);
      }

      task.tags.forEach((tag) => {
        const tagBadge = document.createElement("span");
        tagBadge.className = "task-tag";
        tagBadge.textContent = tag.name;
        applyTagColor(tagBadge, tag.color);
        meta.append(tagBadge);
      });

      const restoreButton = document.createElement("button");
      restoreButton.className = "restore-button";
      restoreButton.type = "button";
      restoreButton.textContent = "Восстановить";

      const deleteButton = document.createElement("button");
      deleteButton.className = "delete-button";
      deleteButton.type = "button";
      deleteButton.textContent = "Удалить навсегда";

      restoreButton.addEventListener("click", () => {
        restoreTask(task.id);
      });

      deleteButton.addEventListener("click", () => {
        deleteTaskForever(task.id);
      });

      taskContent.append(taskText, priority);

      if (meta.children.length) {
        taskContent.append(meta);
      }

      item.append(taskContent, restoreButton, deleteButton);
      return item;
    }

    function getVisibleTasksByStatus(status) {
      return tasks
        .filter((task) => !task.deleted && task.status === status)
        .sort((firstTask, secondTask) => firstTask.order - secondTask.order);
    }

    function renderTasks() {
      document.querySelectorAll(".column .tasks").forEach((list) => {
        list.innerHTML = "";
      });
      trashTasks.innerHTML = "";

      document.querySelectorAll(".column").forEach((column) => {
        const status = column.dataset.status;
        const list = column.querySelector(".tasks");

        getVisibleTasksByStatus(status).forEach((task) => {
          list.append(createTaskElement(task));
        });
      });

      tasks.filter((task) => task.deleted).forEach((task) => {
        trashTasks.append(createTrashTaskElement(task));
      });

      trashEmpty.hidden = tasks.some((task) => task.deleted);
      clearTrashButton.disabled = !tasks.some((task) => task.deleted);
    }

    function renderNewTagControls() {
      renderPalette(newTagPalette, selectedNewTagColor, (colorId) => {
        selectedNewTagColor = colorId;
        renderNewTagControls();
      });

      renderTagList(newTagList, newTaskTags, renderNewTagControls);
    }

    function renderEditTagControls() {
      renderPalette(editTagPalette, selectedEditTagColor, (colorId) => {
        selectedEditTagColor = colorId;
        renderEditTagControls();
      });

      renderTagList(editTagList, editTaskTags, renderEditTagControls);
    }

    function getDragAfterElement(list, y) {
      const draggableElements = [...list.querySelectorAll(".task:not(.dragging)")];

      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;

        if (offset < 0 && offset > closest.offset) {
          return { offset, element: child };
        }

        return closest;
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function syncBoardOrderFromDom() {
      columns.forEach((column) => {
        const status = column.dataset.status;
        const taskElements = column.querySelectorAll(".task");

        taskElements.forEach((item, index) => {
          const task = getTaskById(item.dataset.id);

          if (!task) {
            return;
          }

          task.status = status;
          task.deleted = false;
          task.previousStatus = null;
          task.order = index;
        });
      });

      saveTasks();
      renderTasks();
    }

    columns.forEach((column) => {
      column.addEventListener("dragover", (event) => {
        event.preventDefault();
        column.classList.add("drag-over");

        if (!draggedTask) {
          return;
        }

        const list = column.querySelector(".tasks");
        const draggedElement = document.querySelector(`[data-id="${draggedTask}"]`);
        const afterElement = getDragAfterElement(list, event.clientY);

        if (!draggedElement) {
          return;
        }

        if (!afterElement) {
          list.append(draggedElement);
          return;
        }

        list.insertBefore(draggedElement, afterElement);
      });

      column.addEventListener("dragleave", () => {
        column.classList.remove("drag-over");
      });

      column.addEventListener("drop", () => {
        column.classList.remove("drag-over");

        if (!draggedTask) {
          return;
        }

        syncBoardOrderFromDom();
      });
    });

    taskForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const text = taskInput.value.trim();
      if (!text) {
        return;
      }

      tasks.push(createTaskData(text, taskPriority.value, taskDeadline.value, newTaskTags));
      saveTasks();
      renderTasks();
      taskInput.value = "";
      taskPriority.value = "medium";
      taskDeadline.value = "";
      newTaskTags = [];
      selectedNewTagColor = tagColors[0].id;
      renderNewTagControls();
      taskInput.focus();
    });

    editForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const task = getTaskById(editingTaskId);
      const title = editTitleInput.value.trim();

      if (!task || !title) {
        return;
      }

      task.title = title;
      task.priority = editPrioritySelect.value;
      task.deadline = editDeadlineInput.value;
      task.tags = cloneTags(editTaskTags).filter((tag) => tag.name);
      saveTasks();
      renderTasks();
      closeEditModal();
    });

    cancelEditButton.addEventListener("click", closeEditModal);
    closeModalButton.addEventListener("click", closeEditModal);

    editModal.addEventListener("click", (event) => {
      if (event.target === editModal) {
        closeEditModal();
      }
    });

    clearTrashButton.addEventListener("click", () => {
      tasks = tasks.filter((task) => !task.deleted);
      saveTasks();
      renderTasks();
    });

    addNewTagButton.addEventListener("click", () => {
      addTag(newTaskTags, newTagInput, selectedNewTagColor, renderNewTagControls);
    });

    newTagInput.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") {
        return;
      }

      event.preventDefault();
      addTag(newTaskTags, newTagInput, selectedNewTagColor, renderNewTagControls);
    });

    addEditTagButton.addEventListener("click", () => {
      addTag(editTaskTags, editTagInput, selectedEditTagColor, renderEditTagControls);
    });

    editTagInput.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") {
        return;
      }

      event.preventDefault();
      addTag(editTaskTags, editTagInput, selectedEditTagColor, renderEditTagControls);
    });

    renderNewTagControls();
    renderEditTagControls();
    renderTasks();
  </script>
</body>
</html>
