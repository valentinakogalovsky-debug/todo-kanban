<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do Board</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #f7f0df;
      background:
        linear-gradient(rgba(18, 40, 29, 0.72), rgba(18, 40, 29, 0.78)),
        radial-gradient(circle at 20% 20%, rgba(113, 147, 92, 0.45), transparent 28%),
        linear-gradient(135deg, #10251a 0%, #27472f 38%, #6f5738 100%);
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .app {
      width: 100%;
      max-width: 100%;
    }

    h1 {
      margin: 0 0 24px;
      font-family: "Cotta", Georgia, "Times New Roman", serif;
      font-size: 42px;
      font-weight: 700;
      text-align: center;
      color: #fff7df;
      text-shadow: 0 2px 8px rgba(16, 37, 26, 0.7);
    }

    .form {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    input,
    select {
      flex: 1;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid #c8d2df;
      border-radius: 6px;
      font-size: 16px;
      color: #233225;
      background: rgba(255, 250, 235, 0.94);
    }

    input:focus,
    select:focus {
      outline: 2px solid #b5d18a;
      border-color: #5e8b4a;
    }

    select {
      max-width: 160px;
    }

    .date-input {
      max-width: 170px;
    }

    button {
      border: 0;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }

    .add-button {
      padding: 0 18px;
      color: #fff7df;
      background: #4f7b3f;
      font-weight: 700;
    }

    .add-button:hover {
      background: #3f6532;
    }

    .column-message {
      color: #f7e3a1;
      font-size: 13px;
      font-weight: 700;
    }

    .column-button,
    .rename-column-button {
      padding: 9px 12px;
      color: #fff7df;
      background: #5a4632;
      font-weight: 700;
    }

    .column-button:hover,
    .rename-column-button:hover {
      background: #453626;
    }

    .column-button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .project-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: -8px 0 22px;
    }

    .project-label {
      color: #fff7df;
      font-weight: 700;
    }

    .project-select {
      flex: 0 1 260px;
      max-width: 280px;
      font-weight: 700;
    }

    .project-button {
      padding: 11px 14px;
      color: #fff7df;
      background: #4f7b3f;
      font-weight: 700;
    }

    .project-button:hover {
      background: #3f6532;
    }

    .board {
      display: flex;
      flex-wrap: nowrap;
      align-items: flex-start;
      gap: 10px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2px 2px 12px;
      scroll-padding: 12px;
    }

    .column {
      flex: 0 0 clamp(220px, calc((100% - 30px) / 4), 280px);
      min-height: 250px;
      padding: 10px;
      border: 1px solid rgba(207, 190, 143, 0.6);
      border-radius: 6px;
      background: rgba(35, 60, 39, 0.78);
      box-shadow: inset 0 0 0 1px rgba(255, 248, 220, 0.06);
    }

    .column.drag-over {
      border-color: #d9bf74;
      background: rgba(68, 94, 49, 0.82);
    }

    .column.column-dragging {
      opacity: 0.62;
    }

    .column-title {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
      color: #fff7df;
    }

    .column-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
      cursor: grab;
    }

    .column-title-row:active {
      cursor: grabbing;
    }

    .column-title-row .column-title {
      margin: 0;
    }

    .rename-column-button {
      flex: 0 0 auto;
      width: 34px;
      height: 30px;
      padding: 0;
      font-size: 13px;
    }

    .tasks {
      min-height: 200px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .task {
      display: flex;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      border: 1px solid #7b5635;
      border-radius: 6px;
      color: #2a1c11;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.08), transparent 18%, rgba(66, 36, 18, 0.08) 50%, transparent 82%),
        linear-gradient(180deg, #c99a62 0%, #b77d43 100%);
      box-shadow: 0 7px 18px rgba(16, 37, 26, 0.24);
      cursor: grab;
    }

    .task.dragging {
      opacity: 0.6;
      cursor: grabbing;
    }

    .task.priority-low {
      border-left: 6px solid #5e8b4a;
    }

    .task.priority-medium {
      border-left: 6px solid #d1a13f;
    }

    .task.priority-high {
      border-left: 6px solid #a63d40;
    }

    .task.deadline-urgent {
      background:
        linear-gradient(90deg, rgba(255,255,255,0.08), transparent 18%, rgba(66, 36, 18, 0.08) 50%, transparent 82%),
        linear-gradient(180deg, #d5aa64 0%, #bd8446 100%);
    }

    .task.deadline-overdue {
      background:
        linear-gradient(90deg, rgba(255,255,255,0.08), transparent 18%, rgba(66, 36, 18, 0.08) 50%, transparent 82%),
        linear-gradient(180deg, #c57b5a 0%, #a85a3d 100%);
      border-color: #8f352f;
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      appearance: none;
      border: 2px solid #7a1f32;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ff8fa3, #b8324a 62%, #7a1f32);
      cursor: pointer;
    }

    .task-checkbox:checked {
      border-color: #315f2e;
      background: radial-gradient(circle at 35% 30%, #d9f99d, #5e8b4a 62%, #315f2e);
      box-shadow: inset 0 0 0 3px rgba(255, 247, 223, 0.55);
    }

    .task-text {
      flex: 1;
      overflow-wrap: break-word;
      word-break: normal;
      line-height: 1.4;
    }

    .task-content {
      flex: 1 1 150px;
      min-width: 0;
    }

    .task-priority {
      display: inline-block;
      margin-top: 6px;
      padding: 3px 7px;
      border-radius: 6px;
      background: rgba(255, 247, 223, 0.72);
      color: #4b3621;
      font-size: 12px;
      font-weight: 700;
    }

    .add-column-card {
      flex: 0 0 220px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border: 1px dashed rgba(207, 190, 143, 0.72);
      border-radius: 6px;
      background: rgba(35, 60, 39, 0.52);
    }

    .add-column-card .column-button {
      width: 100%;
      text-align: left;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .task-deadline,
    .task-tag,
    .task-deadline-label {
      display: inline-block;
      padding: 3px 7px;
      border-radius: 6px;
      background: #eef2f7;
      color: #52606d;
      font-size: 12px;
      font-weight: 700;
    }

    .task-deadline-label.urgent {
      background: #fef3c7;
      color: #92400e;
    }

    .task-deadline-label.overdue {
      background: #fee2e2;
      color: #991b1b;
    }

    .task-tag {
      background: #5e8b4a;
      color: #fff7df;
    }

    .task.done .task-text {
      color: #7b8794;
      text-decoration: line-through;
    }

    .delete-button {
      padding: 8px 10px;
      color: #fff7df;
      background: #8f352f;
    }

    .delete-button:hover {
      background: #73302b;
    }

    .edit-button,
    .restore-button {
      padding: 8px 10px;
      color: #fff7df;
      background: #5a4632;
    }

    .edit-button:hover,
    .restore-button:hover {
      background: #453626;
    }

    .trash .task {
      cursor: default;
    }

    .trash-toggle {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 10;
      width: 58px;
      height: 58px;
      border: 2px solid rgba(255, 247, 223, 0.75);
      border-radius: 50%;
      color: #fff7df;
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 247, 223, 0.28), transparent 34%),
        linear-gradient(180deg, #7b5635 0%, #4b3522 100%);
      box-shadow: 0 10px 24px rgba(16, 37, 26, 0.42);
      font-size: 27px;
    }

    .trash-toggle:hover {
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 247, 223, 0.34), transparent 34%),
        linear-gradient(180deg, #8b6340 0%, #5a3f29 100%);
    }

    .trash-count {
      position: absolute;
      top: -7px;
      right: -7px;
      min-width: 24px;
      height: 24px;
      padding: 0 6px;
      border: 2px solid #fff7df;
      border-radius: 999px;
      color: #fff7df;
      background: #a63d40;
      font-size: 13px;
      font-weight: 700;
      line-height: 20px;
      text-align: center;
    }

    .trash-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(16, 37, 26, 0.62);
    }

    .trash-modal.open {
      display: flex;
    }

    .trash-panel {
      width: min(760px, 100%);
      max-height: min(720px, calc(100vh - 32px));
      overflow: auto;
      padding: 16px;
      border: 1px solid rgba(207, 190, 143, 0.72);
      border-radius: 6px;
      background: rgba(35, 60, 39, 0.96);
      box-shadow: 0 18px 44px rgba(16, 37, 26, 0.52);
    }

    .trash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .trash-title {
      margin: 0;
      font-size: 18px;
      color: #fff7df;
    }

    .trash-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .trash-empty {
      margin: 0;
      color: #d8cda5;
    }

    .clear-button {
      padding: 8px 10px;
      color: #fff7df;
      background: #7b5635;
    }

    .clear-button:hover {
      background: #604329;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(31, 41, 51, 0.45);
    }

    .modal.open {
      display: flex;
    }

    .modal-panel {
      width: 100%;
      max-width: 420px;
      padding: 18px;
      border-radius: 6px;
      color: #2a1c11;
      background: #fff4d6;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-title {
      margin: 0;
      font-size: 20px;
    }

    .close-button {
      width: 34px;
      height: 34px;
      color: #2a1c11;
      background: #e8d8ad;
    }

    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .tag-editor {
      flex: 1 1 100%;
      padding: 10px;
      border: 1px solid rgba(207, 190, 143, 0.6);
      border-radius: 6px;
      background: rgba(255, 247, 223, 0.14);
    }

    .tag-editor-title {
      display: block;
      margin-bottom: 8px;
      color: #fff7df;
      font-size: 14px;
      font-weight: 700;
    }

    .modal-field .tag-editor-title,
    .modal-panel .tag-editor-title {
      color: #2a1c11;
    }

    .tag-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .tag-input-row input {
      max-width: none;
    }

    .tag-add-button {
      padding: 0 12px;
      color: #fff7df;
      background: #4f7b3f;
      font-weight: 700;
      white-space: nowrap;
    }

    .tag-palette,
    .tag-row-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .tag-color-button {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 247, 223, 0.8);
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(16, 37, 26, 0.25);
    }

    .tag-color-button.selected {
      outline: 2px solid #fff7df;
      outline-offset: 2px;
    }

    .modal-panel .tag-color-button.selected {
      outline-color: #2a1c11;
    }

    .tag-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tag-row {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) auto;
      gap: 8px;
      padding: 8px;
      border-radius: 6px;
      background: rgba(255, 247, 223, 0.18);
    }

    .modal-panel .tag-row {
      background: rgba(95, 71, 45, 0.12);
    }

    .tag-name-input {
      max-width: none;
    }

    .tag-remove-button {
      padding: 0 10px;
      color: #fff7df;
      background: #8f352f;
    }

    .tag-row-palette {
      grid-column: 1 / -1;
      margin-bottom: 0;
    }

    .modal-field input,
    .modal-field select,
    .modal-field textarea {
      max-width: none;
      font-weight: 400;
    }

    .modal-field textarea {
      min-height: 110px;
      resize: vertical;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    .save-button {
      padding: 10px 14px;
      color: #fff7df;
      background: #4f7b3f;
      font-weight: 700;
    }

    .cancel-button {
      padding: 10px 14px;
      color: #2a1c11;
      background: #e8d8ad;
    }

    .add-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }

    .add-card-toggle {
      width: 100%;
      padding: 9px 10px;
      color: #fff7df;
      background: rgba(79, 123, 63, 0.82);
      text-align: left;
      font-weight: 700;
    }

    .add-card-toggle:hover {
      background: #3f6532;
    }

    .add-card-input {
      width: 100%;
      max-width: none;
    }

    .add-card-actions {
      display: flex;
      gap: 8px;
    }

    .add-card-submit,
    .add-card-cancel {
      padding: 9px 10px;
      font-weight: 700;
    }

    .add-card-submit {
      color: #fff7df;
      background: #4f7b3f;
    }

    .add-card-cancel {
      color: #2a1c11;
      background: #e8d8ad;
    }

    @media (max-width: 480px) {
      .form {
        flex-direction: column;
      }

      .add-button {
        min-height: 44px;
      }

      select {
        max-width: none;
      }

      .date-input,
      .tag-editor {
        max-width: none;
      }

      .tag-input-row,
      .tag-row {
        grid-template-columns: 1fr;
        flex-direction: column;
      }

      .trash-toggle {
        right: 14px;
        bottom: 14px;
      }

    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Task Tracker</h1>

    <section class="project-bar" aria-label="Управление проектами">
      <span class="project-label">Проект:</span>
      <select class="project-select" id="projectSelect" aria-label="Выбор проекта"></select>
      <button class="project-button" id="addProjectButton" type="button">Добавить проект</button>
    </section>

    <section class="board" id="board" aria-label="Канбан-доска"></section>

  </main>

  <button class="trash-toggle" id="trashToggle" type="button" aria-label="Открыть корзину">
    🧺
    <span class="trash-count" id="trashCount" hidden>0</span>
  </button>

  <div class="trash-modal" id="trashModal" aria-hidden="true">
    <section class="trash-panel trash" aria-label="Корзина">
      <div class="trash-header">
        <h2 class="trash-title">Корзина</h2>
        <div class="trash-actions">
          <button class="clear-button" id="clearTrashButton" type="button">Очистить корзину</button>
          <button class="close-button" id="closeTrashButton" type="button" aria-label="Закрыть корзину">×</button>
        </div>
      </div>
      <p class="trash-empty" id="trashEmpty">Корзина пуста</p>
      <ul class="tasks" id="trashTasks"></ul>
    </section>
  </div>

  <div class="modal" id="editModal" aria-hidden="true">
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="editModalTitle">Редактировать задачу</h2>
        <button class="close-button" id="closeModalButton" type="button" aria-label="Закрыть">×</button>
      </div>

      <form id="editForm">
        <label class="modal-field">
          Текст задачи
          <input id="editTitleInput" type="text" autocomplete="off">
        </label>

        <label class="modal-field">
          Описание задачи
          <textarea id="editDescriptionInput" autocomplete="off"></textarea>
        </label>

        <label class="modal-field">
          Приоритет
          <select id="editPrioritySelect">
            <option value="low">Низкий</option>
            <option value="medium">Средний</option>
            <option value="high">Высокий</option>
          </select>
        </label>

        <label class="modal-field">
          Дедлайн
          <input id="editDeadlineInput" type="date">
        </label>

        <label class="modal-field">
          Теги
          <div class="tag-editor" aria-label="Редактирование тегов">
            <div class="tag-input-row">
              <input id="editTagInput" type="text" placeholder="Название тега" autocomplete="off">
              <button class="tag-add-button" id="addEditTagButton" type="button">Добавить тег</button>
            </div>
            <div class="tag-palette" id="editTagPalette" aria-label="Цвет нового тега"></div>
            <div class="tag-list" id="editTagList"></div>
          </div>
        </label>

        <div class="modal-actions">
          <button class="cancel-button" id="cancelEditButton" type="button">Отмена</button>
          <button class="save-button" type="submit">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="columnModal" aria-hidden="true">
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="columnModalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="columnModalTitle">Добавить колонку</h2>
        <button class="close-button" id="closeColumnModalButton" type="button" aria-label="Закрыть">×</button>
      </div>

      <form id="columnForm">
        <label class="modal-field">
          Название колонки
          <input id="columnTitleInput" type="text" autocomplete="off">
        </label>

        <div class="modal-actions">
          <button class="cancel-button" id="cancelColumnButton" type="button">Отмена</button>
          <button class="save-button" type="submit">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="projectModal" aria-hidden="true">
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="projectModalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="projectModalTitle">Добавить проект</h2>
        <button class="close-button" id="closeProjectModalButton" type="button" aria-label="Закрыть">×</button>
      </div>

      <form id="projectForm">
        <label class="modal-field">
          Название проекта
          <input id="projectTitleInput" type="text" autocomplete="off">
        </label>

        <div class="modal-actions">
          <button class="cancel-button" id="cancelProjectButton" type="button">Отмена</button>
          <button class="save-button" type="submit">Создать</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const storageKey = "todo-kanban-tasks";
    const columnsStorageKey = "todo-kanban-columns";
    const projectsStorageKey = "todo-kanban-projects";
    const defaultProjectTitle = "Основной проект";
    const defaultColumns = [
      { id: "todo", title: "К выполнению", isDefault: true, order: 0 },
      { id: "in-progress", title: "В работе", isDefault: true, order: 1 },
      { id: "done", title: "Готово", isDefault: true, order: 2 }
    ];
    function createDefaultColumns() {
      return defaultColumns.map((column) => ({ ...column }));
    }

    const maxCustomColumns = 5;
    const priorityLabels = {
      low: "Низкий",
      medium: "Средний",
      high: "Высокий"
    };
    const tagColors = [
      { id: "green", label: "Зелёный", value: "#5E8B4A" },
      { id: "olive", label: "Оливковый", value: "#7A8F45" },
      { id: "brown", label: "Коричневый", value: "#8B5A2B" },
      { id: "sand", label: "Песочный", value: "#C2A15A" },
      { id: "dark-green", label: "Тёмно-зелёный", value: "#2F5D3A" },
      { id: "berry-red", label: "Ягодный красный", value: "#A63D40" },
      { id: "cranberry", label: "Клюквенный", value: "#8E2F4F" },
      { id: "mustard", label: "Горчичный", value: "#B88A2D" },

    function loadLegacyTasks() {
      const savedTasks = localStorage.getItem(storageKey);

      if (!savedTasks) {
        return [];
      }

      try {
        const parsedTasks = JSON.parse(savedTasks);
        return Array.isArray(parsedTasks) ? parsedTasks : [];
      } catch {
        return [];
      }
    }

    function loadLegacyColumns() {
      const savedColumns = localStorage.getItem(columnsStorageKey);

      if (!savedColumns) {
        return defaultColumns;
      }

      try {
        const parsedColumns = JSON.parse(savedColumns);
        return Array.isArray(parsedColumns) ? parsedColumns : defaultColumns;
      } catch {
        return defaultColumns;
      }
    }

    function loadProjectState() {
      const savedProjects = localStorage.getItem(projectsStorageKey);

      if (!savedProjects) {
        return null;
      }

      try {
        const parsedProjects = JSON.parse(savedProjects);
        return parsedProjects && typeof parsedProjects === "object" ? parsedProjects : null;
      } catch {
        return null;
      }
    }

    function saveProjectState() {
      const currentProject = getCurrentProject();

      if (currentProject) {
        currentProject.columns = boardColumns;
        currentProject.tasks = tasks;
      }

      localStorage.setItem(projectsStorageKey, JSON.stringify(projectState));
    }

    function createProject(title, columns = createDefaultColumns(), taskList = []) {
      const normalizedColumns = normalizeColumns(columns);

      return {
        id: `project-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        title,
        columns: normalizedColumns,
        tasks: normalizeTasks(taskList, normalizedColumns)
      };
    }

    function normalizeProject(project, index) {
      const normalizedColumns = normalizeColumns(Array.isArray(project.columns) ? project.columns : createDefaultColumns());

      return {
        id: project.id || `project-${Date.now()}-${index}`,
        title: project.title || `Проект ${index + 1}`,
        columns: normalizedColumns,
        tasks: normalizeTasks(Array.isArray(project.tasks) ? project.tasks : [], normalizedColumns)
      };
    }

    function normalizeProjectState(savedState) {
      if (savedState && Array.isArray(savedState.projects) && savedState.projects.length) {
        const projects = savedState.projects.map(normalizeProject);
        const currentProjectId = projects.some((project) => project.id === savedState.currentProjectId)
          ? savedState.currentProjectId
          : projects[0].id;

        return { projects, currentProjectId };
      }

      const legacyProject = createProject(defaultProjectTitle, loadLegacyColumns(), loadLegacyTasks());
      return {
        projects: [legacyProject],
        currentProjectId: legacyProject.id
      };
    }

    function getCurrentProject() {
      return projectState.projects.find((project) => project.id === projectState.currentProjectId) || projectState.projects[0];
    }

    function syncCurrentProjectFromState() {
      const currentProject = getCurrentProject();
      boardColumns = currentProject.columns;
      tasks = currentProject.tasks;
    }

    function switchProject(projectId) {
      if (!projectState.projects.some((project) => project.id === projectId)) {
        return;
      }

      saveProjectState();
      projectState.currentProjectId = projectId;
      activeAddCardColumnId = null;
      draggedTask = null;
      draggedColumn = null;
      syncCurrentProjectFromState();
      saveProjectState();
      renderTasks();
    }

    function addProject(title) {
      const project = createProject(title);
      saveProjectState();
      projectState.projects.push(project);
      projectState.currentProjectId = project.id;
      syncCurrentProjectFromState();
      saveProjectState();
      renderTasks();
    }

    function renderProjectControls() {
      projectSelect.innerHTML = "";

      projectState.projects.forEach((project) => {
        const option = document.createElement("option");
        option.value = project.id;
        option.textContent = project.title;
        option.selected = project.id === projectState.currentProjectId;
        projectSelect.append(option);
      });
    }

    function normalizeColumns(columnList) {
      const normalized = [];

      defaultColumns.forEach((defaultColumn) => {
        const savedColumn = columnList.find((column) => column.id === defaultColumn.id);
        normalized.push({
          ...defaultColumn,
          title: savedColumn && savedColumn.title ? savedColumn.title : defaultColumn.title
        });
      });

      columnList
        .filter((column) => !defaultColumns.some((defaultColumn) => defaultColumn.id === column.id))
        .slice(0, maxCustomColumns)
        .forEach((column, index) => {
          normalized.push({
            id: column.id || `custom-${Date.now()}-${index}`,
            title: column.title || `Колонка ${index + 1}`,
            isDefault: false,
            order: Number.isFinite(column.order) ? column.order : normalized.length
          });
        });

      return normalized
        .sort((firstColumn, secondColumn) => firstColumn.order - secondColumn.order)
        .map((column, index) => ({ ...column, order: index }));
    }

    function getColumnById(columnId, columnList = boardColumns) {
      return columnList.find((column) => column.id === columnId);
    }

    function getColumnTitle(columnId) {
      const column = getColumnById(columnId);
      return column ? column.title : "К выполнению";
    }

    function normalizeTag(tag) {
      if (typeof tag === "string") {
        return {
          name: tag,
          color: tagColors[0].id
        };
      }

      return {
        name: tag.name || "",
        color: tagColors.some((color) => color.id === tag.color) ? tag.color : tagColors[0].id
      };
    }

    function normalizeTasks(taskList, columnList = boardColumns) {
      return taskList.map((task, index) => ({
        id: task.id || `${Date.now()}-${index}`,
        title: task.title || "",
        description: task.description || "",
        status: task.status || task.columnId || "todo",
        columnId: getColumnById(task.columnId || task.status, columnList) ? (task.columnId || task.status) : "todo",
        priority: task.priority || "medium",
        deleted: Boolean(task.deleted),
        previousStatus: task.previousStatus || null,
        previousColumnId: getColumnById(task.previousColumnId || task.previousStatus, columnList) ? (task.previousColumnId || task.previousStatus) : null,
        deadline: task.deadline || "",
        tags: Array.isArray(task.tags) ? task.tags.map(normalizeTag).filter((tag) => tag.name) : [],
        order: Number.isFinite(task.order) ? task.order : index
      }));
    }

    function getTaskById(id) {
      return tasks.find((task) => task.id === id);
    }

    function cloneTags(tags) {
      return tags.map((tag) => ({ ...tag }));
    }

    function getTagColor(colorId) {
      return tagColors.find((color) => color.id === colorId) || tagColors[0];
    }

    function getReadableTextColor(hex) {
      const red = parseInt(hex.slice(1, 3), 16);
      const green = parseInt(hex.slice(3, 5), 16);
      const blue = parseInt(hex.slice(5, 7), 16);
      const brightness = (red * 299 + green * 587 + blue * 114) / 1000;

      return brightness > 145 ? "#2a1c11" : "#fff7df";
    }

    function applyTagColor(element, colorId) {
      const color = getTagColor(colorId);
      element.style.background = color.value;
      element.style.color = getReadableTextColor(color.value);
    }

    function renderPalette(container, selectedColor, onSelect) {
      container.innerHTML = "";

      tagColors.forEach((color) => {
        const button = document.createElement("button");
        button.className = "tag-color-button";
        button.type = "button";
        button.title = color.label;
        button.setAttribute("aria-label", color.label);
        button.style.background = color.value;
        button.classList.toggle("selected", color.id === selectedColor);

        button.addEventListener("click", () => {
          onSelect(color.id);
        });

        container.append(button);
      });
    }

    function renderTagList(container, tags, onChange) {
      container.innerHTML = "";

      tags.forEach((tag, index) => {
        const row = document.createElement("div");
        row.className = "tag-row";

        const input = document.createElement("input");
        input.className = "tag-name-input";
        input.type = "text";
        input.value = tag.name;
        input.setAttribute("aria-label", "Название тега");

        const removeButton = document.createElement("button");
        removeButton.className = "tag-remove-button";
        removeButton.type = "button";
        removeButton.textContent = "Удалить";

        const palette = document.createElement("div");
        palette.className = "tag-row-palette";

        input.addEventListener("input", () => {
          tags[index].name = input.value.trim();
        });

        removeButton.addEventListener("click", () => {
          tags.splice(index, 1);
          onChange();
        });

        renderPalette(palette, tag.color, (colorId) => {
          tags[index].color = colorId;
          onChange();
        });

        row.append(input, removeButton, palette);
        container.append(row);
      });
    }

    function addTag(tags, input, colorId, onChange) {
      const name = input.value.trim();

      if (!name) {
        return;
      }

      tags.push({ name, color: colorId });
      input.value = "";
      onChange();
    }

    function getNextOrder(columnId) {
      const orders = tasks
        .filter((task) => !task.deleted && task.columnId === columnId)
        .map((task) => task.order);

      return orders.length ? Math.max(...orders) + 1 : 0;
    }

    function createTaskData(title, columnId) {
      return {
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        title,
        description: "",
        status: columnId,
        columnId,
        priority: "medium",
        deadline: "",
        tags: [],
        order: getNextOrder(columnId),
        deleted: false,
        previousStatus: null,
        previousColumnId: null
      };
    }

    function updateTaskStatus(task, columnId) {
      task.status = columnId;
      task.columnId = columnId;
      task.deleted = false;
      task.previousStatus = null;
      task.previousColumnId = null;
      task.order = getNextOrder(columnId);
      saveTasks();
      renderTasks();
    }

    function formatDeadline(value) {
      if (!value) {
        return "";
      }

      const [year, month, day] = value.split("-");
      return `${day}.${month}.${year}`;
    }

    function getDeadlineState(task) {
      if (!task.deadline || task.columnId === "done") {
        return "";
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const tomorrow = new Date(today);
      tomorrow.setDate(today.getDate() + 1);

      const deadline = new Date(`${task.deadline}T00:00:00`);

      if (deadline < today) {
        return "overdue";
      }

      if (deadline <= tomorrow) {
        return "urgent";
      }

      return "";
    }

    function moveTaskToStatus(taskId, columnId) {
      const task = getTaskById(taskId);

      if (!task) {
        return;
      }

      updateTaskStatus(task, columnId);
    }

    function sendTaskToTrash(taskId) {
      const task = getTaskById(taskId);

      if (!task) {
        return;
      }

      task.previousStatus = task.status;
      task.previousColumnId = task.columnId;
      task.deleted = true;
      saveTasks();
      renderTasks();
    }

    function restoreTask(taskId) {
      const task = getTaskById(taskId);

      if (!task) {
        return;
      }

      task.columnId = getColumnById(task.previousColumnId) ? task.previousColumnId : "todo";
      task.status = task.columnId;
      task.previousStatus = null;
      task.previousColumnId = null;
      task.deleted = false;
      task.order = getNextOrder(task.columnId);
      saveTasks();
      renderTasks();
    }

    function deleteTaskForever(taskId) {
      tasks = tasks.filter((task) => task.id !== taskId);
      saveTasks();
      renderTasks();
    }

    function createColumn(title) {
      const customColumnCount = boardColumns.filter((column) => !column.isDefault).length;

      if (customColumnCount >= maxCustomColumns) {
        columnMessage.textContent = "Можно добавить не больше 5 дополнительных колонок";
        return;
      }

      boardColumns.push({
        id: `custom-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        title,
        isDefault: false,
        order: boardColumns.length
      });
      saveColumns();
      renderTasks();
    }

    function renameColumn(columnId, title) {
      const column = getColumnById(columnId);

      if (!column) {
        return;
      }

      column.title = title;
      saveColumns();
      renderTasks();
    }

    function addTaskToColumn(columnId, title) {
      if (!getColumnById(columnId) || !title) {
        return;
      }

      tasks.push(createTaskData(title, columnId));
      activeAddCardColumnId = null;
      saveTasks();
      renderTasks();
    }

    function createTaskElement(task) {
      const item = document.createElement("li");
      const deadlineState = getDeadlineState(task);
      item.className = `task priority-${task.priority}`;
      item.dataset.id = task.id;
      item.dataset.status = task.columnId;
      item.draggable = true;
      item.classList.toggle("done", task.columnId === "done");
      item.classList.toggle("deadline-urgent", deadlineState === "urgent");
      item.classList.toggle("deadline-overdue", deadlineState === "overdue");

      const checkbox = document.createElement("input");
      checkbox.className = "task-checkbox";
      checkbox.type = "checkbox";
      checkbox.checked = task.columnId === "done";

      const taskContent = document.createElement("div");
      taskContent.className = "task-content";

      const taskText = document.createElement("span");
      taskText.className = "task-text";
      taskText.textContent = task.title;

      const priority = document.createElement("span");
      priority.className = "task-priority";
      priority.textContent = priorityLabels[task.priority];

      const meta = document.createElement("div");
      meta.className = "task-meta";

      if (task.deadline) {
        const deadline = document.createElement("span");
        deadline.className = "task-deadline";
        deadline.textContent = `Дедлайн: ${formatDeadline(task.deadline)}`;
        meta.append(deadline);
      }

      if (deadlineState) {
        const deadlineLabel = document.createElement("span");
        deadlineLabel.className = `task-deadline-label ${deadlineState}`;
        deadlineLabel.textContent = deadlineState === "overdue" ? "Просрочено" : "Срочно";
        meta.append(deadlineLabel);
      }

      task.tags.forEach((tag) => {
        const tagBadge = document.createElement("span");
        tagBadge.className = "task-tag";
        tagBadge.textContent = tag.name;
        applyTagColor(tagBadge, tag.color);
        meta.append(tagBadge);
      });

      const editButton = document.createElement("button");
      editButton.className = "edit-button";
      editButton.type = "button";
      editButton.textContent = "Редактировать";

      const deleteButton = document.createElement("button");
      deleteButton.className = "delete-button";
      deleteButton.type = "button";
      deleteButton.textContent = "Удалить";

      checkbox.addEventListener("change", () => {
        if (checkbox.checked) {
          moveTaskToStatus(task.id, "done");
          return;
        }

        moveTaskToStatus(task.id, "todo");
      });

      editButton.addEventListener("click", (event) => {
        event.stopPropagation();
        openEditModal(task.id);
      });

      deleteButton.addEventListener("click", () => {
        sendTaskToTrash(task.id);
      });

      item.addEventListener("dragstart", () => {
        draggedTask = task.id;
        item.classList.add("dragging");
      });

      item.addEventListener("dragend", () => {
        item.classList.remove("dragging");
        draggedTask = null;
      });

      item.addEventListener("click", (event) => {
        if (event.target.closest("button") || event.target.closest("input")) {
          return;
        }

        openEditModal(task.id);
      });

      taskContent.append(taskText, priority);

      if (meta.children.length) {
        taskContent.append(meta);
      }

      item.append(checkbox, taskContent, editButton, deleteButton);
      return item;
    }

    function createTrashTaskElement(task) {
      const item = document.createElement("li");
      item.className = `task priority-${task.priority}`;

      const taskContent = document.createElement("div");
      taskContent.className = "task-content";

      const taskText = document.createElement("span");
      taskText.className = "task-text";
      taskText.textContent = task.title;

      const priority = document.createElement("span");
      priority.className = "task-priority";
      priority.textContent = priorityLabels[task.priority];

      const meta = document.createElement("div");
      meta.className = "task-meta";

      const status = document.createElement("span");
      status.className = "task-deadline";
      status.textContent = `Удалено из: ${getColumnTitle(task.previousColumnId || task.columnId || task.status)}`;
      meta.append(status);

      if (task.deadline) {
        const deadline = document.createElement("span");
        deadline.className = "task-deadline";
        deadline.textContent = `Дедлайн: ${formatDeadline(task.deadline)}`;
        meta.append(deadline);
      }

      task.tags.forEach((tag) => {
        const tagBadge = document.createElement("span");
        tagBadge.className = "task-tag";
        tagBadge.textContent = tag.name;
        applyTagColor(tagBadge, tag.color);
        meta.append(tagBadge);
      });

      const restoreButton = document.createElement("button");
      restoreButton.className = "restore-button";
      restoreButton.type = "button";
      restoreButton.textContent = "Восстановить";

      const deleteButton = document.createElement("button");
      deleteButton.className = "delete-button";
      deleteButton.type = "button";
      deleteButton.textContent = "Удалить навсегда";

      restoreButton.addEventListener("click", () => {
        restoreTask(task.id);
      });

      deleteButton.addEventListener("click", () => {
        deleteTaskForever(task.id);
      });

      taskContent.append(taskText, priority);

      if (meta.children.length) {
        taskContent.append(meta);
      }

      item.append(taskContent, restoreButton, deleteButton);
      return item;
    }

    function createColumnElement(column) {
      const columnElement = document.createElement("div");
      columnElement.className = "column";
      columnElement.dataset.status = column.id;

      const header = document.createElement("div");
      header.className = "column-title-row";
      header.draggable = true;

      const title = document.createElement("h2");
      title.className = "column-title";
      title.textContent = column.title;

      const renameButton = document.createElement("button");
      renameButton.className = "rename-column-button";
      renameButton.type = "button";
      renameButton.textContent = "✎";
      renameButton.title = "Переименовать";
      renameButton.setAttribute("aria-label", "Переименовать колонку");
      renameButton.addEventListener("click", () => {
        openColumnModal(column.id);
      });
      renameButton.addEventListener("dragstart", (event) => {
        event.preventDefault();
      });

      const list = document.createElement("ul");
      list.className = "tasks";

      header.addEventListener("dragstart", (event) => {
        draggedColumn = column.id;
        columnElement.classList.add("column-dragging");
        event.dataTransfer.effectAllowed = "move";
      });

      header.addEventListener("dragend", () => {
        columnElement.classList.remove("column-dragging");
        draggedColumn = null;
        syncColumnOrderFromDom();
      });

      header.append(title, renameButton);
      columnElement.append(header, list, createAddCardElement(column.id));
      attachColumnDragHandlers(columnElement);

      return columnElement;
    }

    function createAddCardElement(columnId) {
      const wrapper = document.createElement("div");
      wrapper.className = "add-card";

      if (activeAddCardColumnId !== columnId) {
        const toggleButton = document.createElement("button");
        toggleButton.className = "add-card-toggle";
        toggleButton.type = "button";
        toggleButton.textContent = "+ Добавить карточку";
        toggleButton.addEventListener("click", () => {
          activeAddCardColumnId = columnId;
          renderTasks();
        });

        wrapper.append(toggleButton);
        return wrapper;
      }

      const input = document.createElement("input");
      input.className = "add-card-input";
      input.type = "text";
      input.placeholder = "Введите название карточки...";
      input.autocomplete = "off";

      const actions = document.createElement("div");
      actions.className = "add-card-actions";

      const submitButton = document.createElement("button");
      submitButton.className = "add-card-submit";
      submitButton.type = "button";
      submitButton.textContent = "Добавить карточку";

      const cancelButton = document.createElement("button");
      cancelButton.className = "add-card-cancel";
      cancelButton.type = "button";
      cancelButton.textContent = "Отмена";

      submitButton.addEventListener("click", () => {
        addTaskToColumn(columnId, input.value.trim());
      });

      input.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") {
          return;
        }

        event.preventDefault();
        addTaskToColumn(columnId, input.value.trim());
      });

      cancelButton.addEventListener("click", () => {
        activeAddCardColumnId = null;
        renderTasks();
      });

      actions.append(submitButton, cancelButton);
      wrapper.append(input, actions);

      requestAnimationFrame(() => input.focus());
      return wrapper;
    }

    function createAddColumnElement() {
      const customColumnCount = boardColumns.filter((column) => !column.isDefault).length;
      const wrapper = document.createElement("div");
      wrapper.className = "add-column-card";

      addColumnButton = document.createElement("button");
      addColumnButton.className = "column-button";
      addColumnButton.id = "addColumnButton";
      addColumnButton.type = "button";
      addColumnButton.textContent = "+ Добавить колонку";
      addColumnButton.disabled = customColumnCount >= maxCustomColumns;

      columnMessage = document.createElement("span");
      columnMessage.className = "column-message";
      columnMessage.id = "columnMessage";
      columnMessage.setAttribute("aria-live", "polite");
      columnMessage.textContent = customColumnCount >= maxCustomColumns
        ? "Можно добавить не больше 5 дополнительных колонок"
        : "";

      addColumnButton.addEventListener("click", () => {
        if (customColumnCount >= maxCustomColumns) {
          columnMessage.textContent = "Можно добавить не больше 5 дополнительных колонок";
          return;
        }

        openColumnModal();
      });

      wrapper.append(addColumnButton, columnMessage);
      return wrapper;
    }

    function renderColumns() {
      board.innerHTML = "";

      boardColumns
        .sort((firstColumn, secondColumn) => firstColumn.order - secondColumn.order)
        .forEach((column) => {
          board.append(createColumnElement(column));
        });

      board.append(createAddColumnElement());
    }

    function getVisibleTasksByStatus(columnId) {
      return tasks
        .filter((task) => !task.deleted && task.columnId === columnId)
        .sort((firstTask, secondTask) => firstTask.order - secondTask.order);
    }

    function renderTasks() {
      renderProjectControls();
      renderColumns();
      document.querySelectorAll(".column .tasks").forEach((list) => {
        list.innerHTML = "";
      });
      trashTasks.innerHTML = "";

      document.querySelectorAll(".column").forEach((column) => {
        const status = column.dataset.status;
        const list = column.querySelector(".tasks");

        getVisibleTasksByStatus(status).forEach((task) => {
          list.append(createTaskElement(task));
        });
      });

      tasks.filter((task) => task.deleted).forEach((task) => {
        trashTasks.append(createTrashTaskElement(task));
      });

      const trashTotal = tasks.filter((task) => task.deleted).length;
      trashEmpty.hidden = trashTotal > 0;
      clearTrashButton.disabled = trashTotal === 0;
      trashCount.hidden = trashTotal === 0;
      trashCount.textContent = trashTotal;
    }

    function renderEditTagControls() {
      renderPalette(editTagPalette, selectedEditTagColor, (colorId) => {
        selectedEditTagColor = colorId;
        renderEditTagControls();
      });

      renderTagList(editTagList, editTaskTags, renderEditTagControls);
    }

    function getDragAfterElement(list, y) {
      const draggableElements = [...list.querySelectorAll(".task:not(.dragging)")];

      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;

        if (offset < 0 && offset > closest.offset) {
          return { offset, element: child };
        }

        return closest;
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function getColumnDragAfterElement(x) {
      const draggableColumns = [...board.querySelectorAll(".column:not(.column-dragging)")];

      return draggableColumns.reduce((closest, column) => {
        const box = column.getBoundingClientRect();
        const offset = x - box.left - box.width / 2;

        if (offset < 0 && offset > closest.offset) {
          return { offset, element: column };
        }

        return closest;
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function syncColumnOrderFromDom() {
      board.querySelectorAll(".column").forEach((columnElement, index) => {
        const column = getColumnById(columnElement.dataset.status);

        if (!column) {
          return;
        }

        column.order = index;
      });

      saveColumns();
      renderTasks();
    }

    function syncBoardOrderFromDom() {
      document.querySelectorAll(".column").forEach((column) => {
        const status = column.dataset.status;
        const taskElements = column.querySelectorAll(".task");

        taskElements.forEach((item, index) => {
          const task = getTaskById(item.dataset.id);

          if (!task) {
            return;
          }

          task.status = status;
          task.columnId = status;
          task.deleted = false;
          task.previousStatus = null;
          task.previousColumnId = null;
          task.order = index;
        });
      });

      saveTasks();
      renderTasks();
    }

    function attachColumnDragHandlers(column) {
      column.addEventListener("dragover", (event) => {
        event.preventDefault();

        if (draggedColumn) {
          const draggedElement = board.querySelector(`[data-status="${draggedColumn}"]`);
          const afterElement = getColumnDragAfterElement(event.clientX);
          const addColumnCard = board.querySelector(".add-column-card");

          if (!draggedElement) {
            return;
          }

          if (!afterElement) {
            board.insertBefore(draggedElement, addColumnCard);
            return;
          }

          board.insertBefore(draggedElement, afterElement);
          return;
        }

        column.classList.add("drag-over");

        if (!draggedTask) {
          return;
        }

        const list = column.querySelector(".tasks");
        const draggedElement = document.querySelector(`[data-id="${draggedTask}"]`);
        const afterElement = getDragAfterElement(list, event.clientY);

        if (!draggedElement) {
          return;
        }

        if (!afterElement) {
          list.append(draggedElement);
          return;
        }

        list.insertBefore(draggedElement, afterElement);
      });

      column.addEventListener("dragleave", () => {
        column.classList.remove("drag-over");
      });

      column.addEventListener("drop", () => {
        column.classList.remove("drag-over");

        if (draggedColumn) {
          syncColumnOrderFromDom();
          return;
        }

        if (!draggedTask) {
          return;
        }

        syncBoardOrderFromDom();
      });
    }

    board.addEventListener("dragover", (event) => {
      if (!draggedColumn) {
        return;
      }

      event.preventDefault();
      const draggedElement = board.querySelector(`[data-status="${draggedColumn}"]`);
      const afterElement = getColumnDragAfterElement(event.clientX);
      const addColumnCard = board.querySelector(".add-column-card");

      if (!draggedElement) {
        return;
      }

      if (!afterElement) {
        board.insertBefore(draggedElement, addColumnCard);
        return;
      }

      board.insertBefore(draggedElement, afterElement);
    });

    board.addEventListener("drop", () => {
      if (!draggedColumn) {
        return;
      }

      syncColumnOrderFromDom();
    });

    projectSelect.addEventListener("change", () => {
      switchProject(projectSelect.value);
    });

    addProjectButton.addEventListener("click", openProjectModal);

    projectForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const title = projectTitleInput.value.trim();

      if (!title) {
        return;
      }

      addProject(title);
      closeProjectModal();
    });

    cancelProjectButton.addEventListener("click", closeProjectModal);
    closeProjectModalButton.addEventListener("click", closeProjectModal);

    projectModal.addEventListener("click", (event) => {
      if (event.target === projectModal) {
        closeProjectModal();
      }
    });

    editForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const task = getTaskById(editingTaskId);
      const title = editTitleInput.value.trim();

      if (!task || !title) {
        return;
      }

      task.title = title;
      task.description = editDescriptionInput.value.trim();
      task.priority = editPrioritySelect.value;
      task.deadline = editDeadlineInput.value;
      task.tags = cloneTags(editTaskTags).filter((tag) => tag.name);
      saveTasks();
      renderTasks();
      closeEditModal();
    });

    cancelEditButton.addEventListener("click", closeEditModal);
    closeModalButton.addEventListener("click", closeEditModal);

    editModal.addEventListener("click", (event) => {
      if (event.target === editModal) {
        closeEditModal();
      }
    });

    trashToggle.addEventListener("click", openTrashModal);
    closeTrashButton.addEventListener("click", closeTrashModal);

    trashModal.addEventListener("click", (event) => {
      if (event.target === trashModal) {
        closeTrashModal();
      }
    });

    columnForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const title = columnTitleInput.value.trim();

      if (!title) {
        return;
      }

      if (editingColumnId) {
        renameColumn(editingColumnId, title);
      } else {
        createColumn(title);
      }

      closeColumnModal();
    });

    cancelColumnButton.addEventListener("click", closeColumnModal);
    closeColumnModalButton.addEventListener("click", closeColumnModal);

    columnModal.addEventListener("click", (event) => {
      if (event.target === columnModal) {
        closeColumnModal();
      }
    });

    clearTrashButton.addEventListener("click", () => {
      tasks = tasks.filter((task) => !task.deleted);
      saveTasks();
      renderTasks();
    });

    addEditTagButton.addEventListener("click", () => {
      addTag(editTaskTags, editTagInput, selectedEditTagColor, renderEditTagControls);
    });

    editTagInput.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") {
        return;
      }

      event.preventDefault();
      addTag(editTaskTags, editTagInput, selectedEditTagColor, renderEditTagControls);
    });

    saveProjectState();
    renderEditTagControls();
    renderTasks();
  </script>
</body>
</html>
